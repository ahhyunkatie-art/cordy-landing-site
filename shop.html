<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | CORD:Y</title>
    <meta
      name="description"
      content="CORD:Y 기능성 이어폰 줄감개 출시 예정 상품과 커스텀 파츠를 확인하세요."
    />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="nav-logo" href="index.html">CORD:Y</a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="shop.html" aria-current="page">Shop</a>
      </nav>
    </header>

    <main class="sub-page">
      <section class="sub-hero">
        <p class="kicker">Shop Preview</p>
        <h1>첫 번째 CORD:Y 라인업.</h1>
        <p>
          2026년 8월 1일 출시 예정입니다. 현재는 상품 미리보기와 출시 알림
          신청을 준비 중입니다.
        </p>
      </section>

      <section class="shop-grid">
        <article class="shop-card product-detail">
          <div class="shop-image">
            <img src="assets/item-revised-transparent.png" alt="CORD:Y 기능성 이어폰 줄감개 제품 이미지" onload="this.nextElementSibling.style.display='none';" onerror="this.src='assets/item image revised.png';" />
            <div class="shop-image-fallback">
              <div class="mini-wing left"></div>
              <div class="mini-wing right"></div>
              <div class="mini-core"></div>
            </div>
          </div>
          <div class="shop-copy">
            <span>COMING SOON</span>
            <h2>Angel Winder · Cloud White</h2>
            <p>폭신한 날개와 별 키링 무드를 담은 기능성 이어폰 줄감개.</p>
            <div class="price-row">
              <strong>9,900원</strong>
              <small>첫 출시 예상가</small>
            </div>
            <div class="option-row" aria-label="상품 옵션">
              <button type="button">Cloud White</button>
              <button type="button">Sky Blue Parts</button>
              <button type="button">Lavender Parts</button>
            </div>
            <a class="button primary shop-button" href="index.html#notifyForm">출시 알림 받고 구매 준비하기</a>
          </div>
        </article>

        <article class="shop-card">
          <div class="swatch sky coming-soon-art" data-text="COMING SOON"></div>
          <h2>Sky Blue Parts</h2>
          <p>하늘빛 파츠 세트</p>
        </article>
        <article class="shop-card">
          <div class="swatch violet coming-soon-art" data-text="COMING SOON"></div>
          <h2>Lavender Parts</h2>
          <p>연보라 파츠 세트</p>
        </article>
        <article class="shop-card">
          <div class="swatch metal coming-soon-art" data-text="COMING SOON"></div>
          <h2>Metal Charm</h2>
          <p>반짝이는 키링 참</p>
        </article>
      </section>
    </main>
  </body>
</html>
